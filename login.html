<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF6B9D">
    <title>Aula Preescolar - Inicio de Sesión</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <style>
        .login-container {
            max-width: 450px;
            margin: 50px auto;
            padding: 40px 30px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(255, 107, 157, 0.3);
            border: 3px solid #FFD6E7;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #C44569;
            font-size: 28px;
            margin: 0 0 10px 0;
        }
        .login-header p {
            color: #8D6E63;
            font-size: 14px;
        }
        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .login-tab {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background: #F8F9FA;
            color: #5D4037;
        }
        .login-tab.active {
            background: linear-gradient(135deg, #FF6B9D, #FF8EAB);
            color: white;
        }
        .login-form {
            display: none;
        }
        .login-form.active {
            display: block;
        }
        .btn-full {
            width: 100%;
            margin-top: 20px;
        }
        .login-divider {
            text-align: center;
            margin: 25px 0;
            color: #8D6E63;
            font-size: 14px;
        }
        .btn-guest {
            background: linear-gradient(135deg, #F8F9FA, #E9ECEF);
            color: #5D4037;
            border: 2px solid #DEE2E6;
        }
        .error-message {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success-message {
            background: #E8F5E9;
            color: #2E7D32;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <span style="font-size: 40px;">🎓</span>
            <div>
                <h1>Aula Preescolar</h1>
                <p>Planificador Docente - Plan 2022 Fase 2</p>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="login-container">
            <div class="login-header">
                <h1>🌸 ¡Bienvenida!</h1>
                <p>Ingresa o crea tu cuenta para continuar</p>
            </div>

            <!-- Pestañas -->
            <div class="login-tabs">
                <button class="login-tab active" onclick="mostrarForm('login')">🔐 Iniciar Sesión</button>
                <button class="login-tab" onclick="mostrarForm('registro')">📝 Registrarse</button>
            </div>

            <!-- Mensajes -->
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <!-- Formulario Login -->
            <form id="login-form" class="login-form active">
                <div class="form-group">
                    <label>📧 Email:</label>
                    <input type="email" id="login-email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 Contraseña:</label>
                    <input type="password" id="login-password" placeholder="Mínimo 6 caracteres" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">🚀 Ingresar</button>
                
                <div class="login-divider">○ O ○</div>
                
                <button type="button" class="btn btn-guest btn-full" onclick="entrarComoInvitado()">
                    👤 Entrar como Invitado (Gratis)
                </button>
            </form>

            <!-- Formulario Registro -->
            <form id="registro-form" class="login-form">
                <div class="form-group">
                    <label>👩‍🏫 Nombre Completo:</label>
                    <input type="text" id="registro-nombre" placeholder="María González" required>
                </div>
                <div class="form-group">
                    <label>🏫 Escuela (Opcional):</label>
                    <input type="text" id="registro-escuela" placeholder="Preescolar Rayito de Sol">
                </div>
                <div class="form-group">
                    <label>📧 Email:</label>
                    <input type="email" id="registro-email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 Contraseña:</label>
                    <input type="password" id="registro-password" placeholder="Mínimo 6 caracteres" required>
                </div>
                <div class="form-group">
                    <label>👥 Rol:</label>
                    <select id="registro-rol" required>
                        <option value="docente">👩‍🏫 Docente</option>
                        <option value="director">🏫 Director/a</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success btn-full">✨ Crear Cuenta Gratis</button>
            </form>

            <div style="text-align: center; margin-top: 25px; color: #8D6E63; font-size: 13px;">
                <p>🔒 Tus datos están protegidos</p>
                <p>Plan 2022 Fase 2 - 4 Campos Formativos</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Aula Preescolar</p>
        <p style="margin-top: 10px; font-size: 12px; color: #999;">
            Los datos se guardan localmente y en la nube (si tienes cuenta)
        </p>
    </footer>

    <!-- Firebase -->
    <script type="module" src="firebase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
